        /* Page Navigation Buttons */

        /* Status Message */

            display: none;

        .status-msg.show {

        @keyframes fadeInOut {

            20% { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* Responsive */

<body>

    <!-- Language Switcher -->
    <div class="language-switcher">
        <button class="lang-btn active" onclick="switchLanguage('default')" id="btn-default">Default</button>
        <button class="lang-btn" onclick="switchLanguage('english')" id="btn-english">English</button>
        <button class="lang-btn" onclick="switchLanguage('hindi')" id="btn-hindi">Hindi</button>
        <button class="lang-btn" onclick="switchLanguage('bangla')" id="btn-bangla">Bangla</button>
    </div>

    <!-- Login Button -->
    <button class="login-btn" id="loginBtn" onclick="showLogin()">🔐 Login</button>

    <!-- Login Modal -->
    <div class="login-modal" id="loginModal">
        <div class="login-box">
            <h3>🔐 Admin Login</h3>
            <input type="email" id="email" placeholder="Admin Email">
            <input type="password" id="password" placeholder="Password">
            <button class="login-submit" onclick="login()">Login</button>
            <button class="close-btn" onclick="hideLogin()">Close</button>
        </div>
    </div>

    <!-- Admin Panel Button -->
    <button class="admin-panel-btn" id="adminPanelBtn" onclick="showAdminPanel()">⚙️ Admin Panel</button>

    <!-- Admin Panel Modal -->
    <div class="admin-panel-modal" id="adminPanelModal">
        <div class="admin-panel-box">
            <h2>📝 Admin Panel</h2>

            <!-- Language Tabs -->
            <div class="editor-tabs">
                <button class="editor-tab-btn active" onclick="showEditor('default')" id="tab-default">Default</button>
                <button class="editor-tab-btn" onclick="showEditor('english')" id="tab-english">English</button>
                <button class="editor-tab-btn" onclick="showEditor('hindi')" id="tab-hindi">Hindi</button>
                <button class="editor-tab-btn" onclick="showEditor('bangla')" id="tab-bangla">Bangla</button>
            </div>

            <!-- Search Bar -->
            <div class="search-bar">
                <input type="number" id="pageSearch" placeholder="Search page number..." min="1">
                <button onclick="searchPage()">🔍 Go</button>
            </div>

            <!-- Page Tabs -->
            <div class="page-tabs-container" id="pageTabsContainer">
                <!-- Page tabs will be generated here -->
            </div>

            <!-- Text Area - NO SCROLL, FIXED SIZE -->
            <textarea id="editorText" placeholder="Type here for this page... Auto-saving enabled"></textarea>

            <!-- Buttons -->
            <div class="btn-group">
                <button class="delete-btn" onclick="deletePage()">🗑️ Delete Page</button>
                <button class="back-btn" onclick="hideAdminPanel()">⬅️ Back</button>
            </div>

            <!-- Auto Save Status -->
            <div class="auto-save-status" id="autoSaveStatus">✅ Auto-save enabled</div>

            <!-- Info -->
            <p class="info">Editing Page <span id="editingPageNum" style="color: #2196F3; font-weight: bold;">1</span> - Language: <span id="editingLang" style="color: #2196F3; font-weight: bold;">default</span></p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-container">
        <div class="page-title" id="pageTitle">You are in 1</div>
        <div class="content-box" id="contentBox">
            <div id="textContent"></div>
        </div>

        <div class="page-nav">
            <button id="prevBtn" onclick="prevPage()" disabled>← Previous Page</button>
            <button id="nextBtn" onclick="nextPage()">Next Page →</button>
        </div>

        <div class="page-counter" id="pageCounter">1 / 1</div>
    </div>

    <!-- Status Message -->
    <div class="status-msg" id="statusMsg"></div>

    <script>
        // ============================================
        // CONFIG
        // ============================================
        const ADMIN_UID = 'vlcEP5N9joYmxbvpoD0xgCpwnwp1';
        const AUTO_SAVE_DELAY = 1000;

        let auth = null;
        let db = null;
        let currentLanguage = 'default';
        let currentPage = 1;
        let totalPages = 1;
        let isAdmin = false;
        let texts = {};
        let editingLang = 'default';
        let editingPage = 1;
        let unsubscribe = null;
        let autoSaveTimer = null;
        let isSaving = false;
        let firebaseReady = false;

        // ============================================
        // FIREBASE INIT
        // ============================================
        function initFirebase() {
            console.log('Checking Firebase...');
            if (window.firebaseAuth && window.firebaseDb) {
                auth = window.firebaseAuth;
                db = window.firebaseDb;
                firebaseReady = true;
                console.log('Firebase ready!');
                setupAuth();
                loadTexts();
            } else {
                console.log('Firebase not ready, retrying...');
                setTimeout(initFirebase, 100);
            }
        }

        // ============================================
        // AUTHENTICATION
        // ============================================
        function setupAuth() {
            console.log('Setting up auth...');
            window.onAuthStateChanged(auth, (user) => {
                console.log('Auth state changed:', user ? 'logged in' : 'logged out');
                if (user && user.uid === ADMIN_UID) {
                    isAdmin = true;
                    document.getElementById('loginBtn').style.display = 'none';
                    document.getElementById('adminPanelBtn').classList.add('show');
                    showStatus('✅ Admin logged in!');
                } else {
                    isAdmin = false;
                    document.getElementById('loginBtn').style.display = 'block';
                    document.getElementById('adminPanelBtn').classList.remove('show');
                    hideAdminPanel();
                }
            });
        }

        function showLogin() {
            console.log('Show login');
            document.getElementById('loginModal').classList.add('show');
        }

        function hideLogin() {
            console.log('Hide login');
            document.getElementById('loginModal').classList.remove('show');
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
        }

        function login() {
            console.log('Login clicked');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showStatus('❌ Enter email and password!');
                return;
            }

            window.signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    console.log('Login success:', userCredential.user.uid);
                    if (userCredential.user.uid !== ADMIN_UID) {
                        showStatus('❌ Not authorized!');
                        window.signOut(auth);
                        return;
                    }
                    hideLogin();
                    showStatus('✅ Login successful!');
                })
                .catch((error) => {
                    console.error('Login error:', error);
                    showStatus('❌ ' + error.message);
                });
        }

        // ============================================
        // ADMIN PANEL
        // ============================================
        function showAdminPanel() {
            console.log('Show admin panel');
            if (!isAdmin) {
                showStatus('❌ Login first!');
                return;
            }
            document.getElementById('adminPanelModal').classList.add('show');
            editingPage = currentPage;
            showEditor('default');
        }

        function hideAdminPanel() {
            console.log('Hide admin panel');
            document.getElementById('adminPanelModal').classList.remove('show');
        }

        function showEditor(lang) {
            console.log('Show editor:', lang);
            editingLang = lang;

            document.querySelectorAll('.editor-tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById('tab-' + lang).classList.add('active');

            document.getElementById('editingLang').textContent = lang;

            generatePageTabs();
            loadEditorPage(editingPage);
        }

        // ============================================
        // GENERATE PAGE TABS
        // ============================================
        function generatePageTabs() {
            console.log('Generating page tabs for:', editingLang);
            const container = document.getElementById('pageTabsContainer');
            container.innerHTML = '';

            let pages = [];
            for (let key in texts) {
                if (key.startsWith(editingLang + '_page_')) {
                    const pageNum = parseInt(key.split('_page_')[1]);
                    if (!pages.includes(pageNum)) {
                        pages.push(pageNum);
                    }
                }
            }

            pages.sort((a, b) => a - b);

            if (pages.length === 0) {
                pages = [1];
            }

            pages.forEach(pageNum => {
                const btn = document.createElement('button');
                btn.className = 'page-tab-btn' + (pageNum === editingPage ? ' active' : '');
                btn.textContent = pageNum;
                btn.onclick = function() { switchEditorPage(pageNum); };
                container.appendChild(btn);
            });

            const newBtn = document.createElement('button');
            newBtn.className = 'page-tab-btn new-page';
            newBtn.textContent = '+';
            newBtn.onclick = createNewPage;
            container.appendChild(newBtn);
        }

        function switchEditorPage(pageNum) {
            console.log('Switch to page:', pageNum);
            autoSaveText();
            editingPage = pageNum;
            loadEditorPage(pageNum);
            generatePageTabs();
        }

        function loadEditorPage(pageNum) {
            const key = editingLang + '_page_' + pageNum;
            document.getElementById('editorText').value = texts[key] || '';
            document.getElementById('editingPageNum').textContent = pageNum;
            document.getElementById('pageSearch').value = pageNum;
        }

        function createNewPage() {
            console.log('Create new page');
            let maxPage = 0;
            for (let key in texts) {
                if (key.startsWith(editingLang + '_page_')) {
                    const pageNum = parseInt(key.split('_page_')[1]);
                    if (pageNum > maxPage) {
                        maxPage = pageNum;
                    }
                }
            }

            const newPageNum = maxPage + 1;
            editingPage = newPageNum;

            const key = editingLang + '_page_' + newPageNum;
            texts[key] = '';

            if (!db) {
                showStatus('❌ Database not ready!');
                return;
            }

            const docRef = window.doc(db, 'websiteContent', 'texts');
            window.setDoc(docRef, texts)
                .then(() => {
                    generatePageTabs();
                    loadEditorPage(newPageNum);
                    showStatus('✅ New page ' + newPageNum + ' created!');
                })
                .catch((error) => {
                    showStatus('❌ Error: ' + error.message);
                });
        }

        function searchPage() {
            console.log('Search page');
            const searchNum = parseInt(document.getElementById('pageSearch').value);

            if (!searchNum || searchNum < 1) {
                showStatus('❌ Enter valid page number!');
                return;
            }

            const key = editingLang + '_page_' + searchNum;
            if (!texts[key] && searchNum > totalPages) {
                if (confirm('Page ' + searchNum + ' does not exist. Create it?')) {
                    editingPage = searchNum;
                    texts[key] = '';

                    if (!db) {
                        showStatus('❌ Database not ready!');
                        return;
                    }

                    const docRef = window.doc(db, 'websiteContent', 'texts');
                    window.setDoc(docRef, texts)
                        .then(() => {
                            generatePageTabs();
                            loadEditorPage(searchNum);
                            showStatus('✅ Page ' + searchNum + ' created!');
                        });
                }
                return;
            }

            editingPage = searchNum;
            generatePageTabs();
            loadEditorPage(searchNum);
            showStatus('✅ Page ' + searchNum + ' loaded!');
        }

        // ============================================
        // AUTO-SAVE
        // ============================================
        function setupAutoSave() {
            console.log('Setup auto-save');
            const textarea = document.getElementById('editorText');

            textarea.addEventListener('input', function() {
                if (autoSaveTimer) {
                    clearTimeout(autoSaveTimer);
                }

                document.getElementById('autoSaveStatus').textContent = '💾 Saving...';
                document.getElementById('autoSaveStatus').style.color = '#FF9800';

                autoSaveTimer = setTimeout(() => {
                    autoSaveText();
                }, AUTO_SAVE_DELAY);
            });
        }

        function autoSaveText() {
            console.log('Auto-save triggered');
            if (!isAdmin || isSaving || !db) return;

            isSaving = true;
            const newText = document.getElementById('editorText').value;
            const key = editingLang + '_page_' + editingPage;
            texts[key] = newText;

            const docRef = window.doc(db, 'websiteContent', 'texts');

            window.setDoc(docRef, texts)
                .then(() => {
                    document.getElementById('autoSaveStatus').textContent = '✅ Saved!';
                    document.getElementById('autoSaveStatus').style.color = '#4CAF50';
                    isSaving = false;

                    setTimeout(() => {
                        document.getElementById('autoSaveStatus').textContent = '✅ Auto-save enabled';
                    }, 2000);
                })
                .catch((error) => {
                    document.getElementById('autoSaveStatus').textContent = '❌ Error: ' + error.message;
                    document.getElementById('autoSaveStatus').style.color = '#f44336';
                    isSaving = false;
                });
        }

        function deletePage() {
            console.log('Delete page');
            if (!isAdmin) {
                showStatus('❌ Only admin can delete!');
                return;
            }

            if (!confirm('Are you sure? This will delete ALL text from Page ' + editingPage + '!')) {
                return;
            }

            const key = editingLang + '_page_' + editingPage;
            texts[key] = '';
            document.getElementById('editorText').value = '';

            if (!db) {
                showStatus('❌ Database not ready!');
                return;
            }

            const docRef = window.doc(db, 'websiteContent', 'texts');

            window.setDoc(docRef, texts)
                .then(() => {
                    showStatus('🗑️ Page ' + editingPage + ' deleted!');
                    generatePageTabs();
                })
                .catch((error) => {
                    showStatus('❌ Error: ' + error.message);
                });
        }

        // ============================================
        // LANGUAGE SWITCHING
        // ============================================
        function switchLanguage(lang) {
            console.log('Switch language:', lang);
            currentLanguage = lang;
            currentPage = 1;

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById('btn-' + lang).classList.add('active');

            calculatePages();
            displayPage();
        }

        // ============================================
        // PAGE NAVIGATION
        // ============================================
        function prevPage() {
            console.log('Previous page');
            if (currentPage > 1) {
                currentPage--;
                displayPage();
            }
        }

        function nextPage() {
            console.log('Next page');
            if (currentPage < totalPages) {
                currentPage++;
                displayPage();
            }
        }

        // ============================================
        // CALCULATE TOTAL PAGES
        // ============================================
        function calculatePages() {
            let maxPage = 0;

            for (let key in texts) {
                if (key.startsWith(currentLanguage + '_page_')) {
                    const pageNum = parseInt(key.split('_page_')[1]);
                    if (texts[key] && texts[key].trim().length > 0 && pageNum > maxPage) {
                        maxPage = pageNum;
                    }
                }
            }

            totalPages = Math.max(1, maxPage);

            if (currentPage > totalPages) {
                currentPage = totalPages;
            }

            updatePageCounter();
            updateNavButtons();
        }

        function updatePageCounter() {
            document.getElementById('pageCounter').textContent = currentPage + ' / ' + totalPages;
            document.getElementById('pageTitle').textContent = 'You are in ' + currentPage;
        }

        function updateNavButtons() {
            document.getElementById('prevBtn').disabled = currentPage <= 1;
            document.getElementById('nextBtn').disabled = currentPage >= totalPages;
        }

        // ============================================
        // DISPLAY PAGE - NO ANIMATION
        // ============================================
        function displayPage() {
            console.log('Display page:', currentPage);
            const contentDiv = document.getElementById('textContent');
            const key = currentLanguage + '_page_' + currentPage;
            const text = texts[key] || '';

            if (!text || text.trim().length === 0) {
                contentDiv.innerHTML = '<span style="color: #999; font-style: italic;">No content on this page...</span>';
            } else {
                contentDiv.innerHTML = escapeHtml(text);
            }

            updatePageCounter();
            updateNavButtons();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================
        // FIRESTORE - LOAD TEXTS
        // ============================================
        function loadTexts() {
            console.log('Load texts');
            if (!db) {
                console.log('DB not ready, retrying...');
                setTimeout(loadTexts, 100);
                return;
            }

            const docRef = window.doc(db, 'websiteContent', 'texts');

            unsubscribe = window.onSnapshot(docRef, (docSnap) => {
                console.log('Data received');
                if (docSnap.exists()) {
                    texts = docSnap.data();
                } else {
                    texts = {
                        'default_page_1': 'Welcome to FireMC!

This is the default text for page 1. Admin can edit this from the Admin Panel.

Click "Login" button on top right and enter admin credentials to access the editor.',
                        'english_page_1': 'Welcome!

This is the English version of the text for page 1.',
                        'hindi_page_1': 'नमस्ते!

यह हिंदी भाषा में पेज 1 का टेक्स्ट है।',
                        'bangla_page_1': 'স্বাগতম!

এটি বাংলা ভাষায় পেজ 1 এর টেক্সট।'
                    };
                    window.setDoc(docRef, texts);
                }
                calculatePages();
                displayPage();
            }, (error) => {
                console.error('Error:', error);
                showStatus('❌ Error loading data!');
            });
        }

        // ============================================
        // STATUS MESSAGE
        // ============================================
        function showStatus(msg) {
            console.log('Status:', msg);
            const statusDiv = document.getElementById('statusMsg');
            statusDiv.textContent = msg;
            statusDiv.classList.add('show');

            setTimeout(() => {
                statusDiv.classList.remove('show');
            }, 2000);
        }

        // ============================================
        // KEYBOARD SHORTCUTS
        // ============================================
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                hideLogin();
                hideAdminPanel();
            }
        });

        // ============================================
        // INITIALIZE
        // ============================================
        console.log('Starting initialization...');
        initFirebase();

        // Setup auto-save after DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                console.log('DOM loaded');
                setupAutoSave();
            });
        } else {
            console.log('DOM already loaded');
            setupAutoSave();
        }

        console.log('Initialization complete');
    </script>
</body>
</html>
